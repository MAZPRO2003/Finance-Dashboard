<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Dashboard | Premium Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Personal Finance Dashboard</h1>
            <div id="current-date" class="text-muted"></div>
        </header>

        <div class="summary-grid">
            <div class="glass-card summary-card">
                <h3>Total Balance</h3>
                <div class="value" id="total-balance">₹0.00</div>
            </div>
            <div class="glass-card summary-card income">
                <h3>Total Income</h3>
                <div class="value" id="total-income">₹0.00</div>
            </div>
            <div class="glass-card summary-card expense">
                <h3>Total Expense</h3>
                <div class="value" id="total-expense">₹0.00</div>
            </div>
        </div>

        <div class="dashboard-main">
            <div class="glass-card">
                <h2 style="margin-bottom: 24px;">Add Transaction</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="Food">Food & Dining</option>
                            <option value="Rent">Rent & Housing</option>
                            <option value="Salary">Salary/Income</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Transport">Transportation</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Quick Entry</label>
                        <div class="chips-container">
                            <span class="chip" data-amount="50" data-category="Food">☕ Coffee (₹50)</span>
                            <span class="chip" data-amount="200" data-category="Food">🍱 Lunch (₹200)</span>
                            <span class="chip" data-amount="100" data-category="Transport">🚖 Taxi (₹100)</span>
                            <span class="chip" data-amount="500" data-category="Shopping">🛍️ Shop (₹500)</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description (Optional)</label>
                        <input type="text" id="description" placeholder="Lunch at office...">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <button type="button" id="voice-btn" class="mic-btn" title="Speak to add transaction">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <div class="form-group">
                            <label>Microphone Input</label>
                            <select id="mic-select" class="form-control" style="margin-bottom: 10px; font-size: 0.8rem;"></select>
                        </div>
                        <div id="voice-status" class="voice-status"></div>
                        <canvas id="mic-visualizer" width="100" height="40" style="display: block; margin: 10px auto;"></canvas>
                    </div>
                    <button type="submit" class="btn-primary">Add Transaction</button>
                </form>
            </div>

            <div class="glass-card dual-charts-card">
                <div class="chart-box">
                    <h2 style="margin-bottom: 16px;">Income Analysis</h2>
                    <div style="height: 300px;">
                        <canvas id="incomeChart"></canvas>
                    </div>
                </div>
                <div class="chart-box">
                    <h2 style="margin-bottom: 16px;">Expense Analysis</h2>
                    <div style="height: 300px;">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card" style="margin-top: 30px;">
            <div class="history-header">
                <h2>Transaction History</h2>
            </div>
            <div class="transaction-list" id="transaction-list">
                <p class="text-muted" style="text-align: center; padding: 20px;">No transactions yet.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
